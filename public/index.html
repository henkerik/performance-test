<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>1600 Parallel Requests Test</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #log { white-space: pre-wrap; max-height: 400px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; }
    #startBtn { padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>1600 Parallel Requests Test</h1>
  <button id="startBtn">Start Test</button>
  <p id="status"></p>
  <div id="log"></div>

<script>
  const startBtn = document.getElementById('startBtn');
  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    logEl.textContent = '';
    statusEl.textContent = 'Starting requests...';

    const totalRequests = 1600;
    const maxParallel = 200; // Limit concurrent requests
    const urls = Array.from({ length: totalRequests }, (_, i) => {
      const jitter = Math.floor(Math.random() * 100); // 0–199 ms jitter
      const delay = 150 + jitter;

      return `https://${i}-${Math.floor(Math.random() * 999999)}-test.henkerikvanderhoek.nl/performance-test?delay=${delay}`
    });

    const startTime = performance.now();
    let completed = 0;

    async function processBatch(startIdx) {
      const batch = urls.slice(startIdx, startIdx + maxParallel);
      await Promise.all(
        batch.map(async (url, idx) => {
          const globalIdx = startIdx + idx;
          try {
            const res = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: `Request #${globalIdx}` })
            });
            const json = await res.json();
            completed++;
            if (completed % 50 === 0) {
              statusEl.textContent = `Completed ${completed} / ${totalRequests}`;
            }
            logEl.textContent += `#${globalIdx} ✅ ${url} (subdomain: ${json.subdomain})\n`;
          } catch (err) {
            completed++;
            logEl.textContent += `#${globalIdx} ❌ ${url} (${err.message})\n`;
          }
        })
      );
    }

    for (let i = 0; i < totalRequests; i += maxParallel) {
      await processBatch(i); // Wait for current batch before starting next
    }

    const endTime = performance.now();
    statusEl.textContent = `All ${totalRequests} requests completed in ${(endTime - startTime).toFixed(2)} ms`;
    startBtn.disabled = false;
  });
</script>
</body>
</html>
