<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>1600 Parallel Requests Test</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #log { white-space: pre-wrap; max-height: 400px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; }
    #startBtn { padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>1600 Parallel Requests Test</h1>
  <button id="startBtn">Start Test</button>
  <p id="status"></p>
  <div id="log"></div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      logEl.textContent = '';
      statusEl.textContent = 'Starting requests...';

      const totalRequests = 10;
      const urls = Array.from({ length: totalRequests }, (_, i) =>
        `https://${i}-performance-test.henkerikvanderhoek.nl`
      );

      const startTime = performance.now();

      let completed = 0;

      const results = await Promise.all(
        urls.map(async (url, idx) => {
          try {
            const res = await fetch(url);
            const json = await res.json();
            completed++;
            if (completed % 50 === 0) {
              statusEl.textContent = `Completed ${completed} / ${totalRequests}`;
            }
            logEl.textContent += `#${idx} ✅ ${url} (subdomain: ${json.subdomain})\n`;
          } catch (err) {
            completed++;
            logEl.textContent += `#${idx} ❌ ${url} (${err.message})\n`;
          }
        })
      );

      const endTime = performance.now();
      statusEl.textContent = `All ${totalRequests} requests completed in ${(endTime - startTime).toFixed(2)} ms`;
      startBtn.disabled = false;
    });
  </script>
</body>
</html>
